<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Phác đồ trẻ hóa Mega Phương</title>
    <meta property="og:title" content="Phác đồ trẻ hóa Mega Phương" />
    <meta property="og:description" content="Hành trình đánh thức vẻ đẹp tự nhiên, gìn giữ thanh xuân." />
    <meta property="og:type" content="website" />
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --btn-primary-grad: linear-gradient(135deg, #3B82F6 0%, #2563EB 100%);
            --btn-secondary-grad: linear-gradient(135deg, #D471F0 0%, #B443E0 100%);
            --btn-success-grad: linear-gradient(135deg, #10B981 0%, #059669 100%);
            --btn-danger-grad: linear-gradient(135deg, #F43F5E 0%, #E11D48 100%);
            --btn-warning-grad: linear-gradient(135deg, #F59E0B 0%, #D97706 100%);
            --btn-ghost-grad: linear-gradient(135deg, #F3F4F6 0%, #E5E7EB 100%);
        }

        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background-color: #FFFFFF;
            color: #1F2937;
        }

        .line-input {
            width: 100%;
            border: none;
            border-bottom: 2px solid #DBEAFE;
            background: transparent;
            padding: 8px 0;
            font-size: 14px;
            font-weight: 500;
            outline: none;
            transition: border-color 0.2s;
        }

        .line-input:focus {
            border-bottom-color: #2563EB;
        }

        /* Modern Gradient Button Styles */
        .btn-modern {
            position: relative;
            border-radius: 9999px;
            border: none;
            color: white;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            cursor: pointer;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            overflow: hidden;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
        }

        .btn-modern:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(0, 0, 0, 0.15);
        }

        .btn-modern:active {
            transform: translateY(0) scale(0.96);
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.1);
        }

        .btn-modern::after {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(rgba(255, 255, 255, 0.2), transparent);
            opacity: 0;
            transition: opacity 0.3s;
        }

        .btn-modern:hover::after {
            opacity: 1;
        }

        .btn-primary { background: var(--btn-primary-grad); }
        .btn-secondary { background: var(--btn-secondary-grad); }
        .btn-success { background: var(--btn-success-grad); }
        .btn-danger { background: var(--btn-danger-grad); }
        .btn-warning { background: var(--btn-warning-grad); }
        .btn-ghost { 
            background: var(--btn-ghost-grad); 
            color: #4B5563; 
            box-shadow: none;
        }

        .scrollbar-hide::-webkit-scrollbar {
            display: none;
        }
        .scrollbar-hide {
            -ms-overflow-style: none;
            scrollbar-width: none;
        }
        ::-webkit-scrollbar {
            width: 6px;
            height: 6px;
        }
        ::-webkit-scrollbar-track {
            background: #f1f1f1;
        }
        ::-webkit-scrollbar-thumb {
            background: #DBEAFE;
            border-radius: 10px;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: #3B82F6;
        }
    </style>
    <link rel="stylesheet" href="./index.css">
    <script>
      // Fix for "Cannot set property fetch of #<Window> which has only a getter"
      // This happens when libraries try to polyfill fetch via global.fetch
      (function() {
        if (typeof window.global === 'undefined') {
          // Use Object.create(window) so that assignments to global.xxx 
          // don't attempt to overwrite read-only properties on window.
          window.global = Object.create(window);
        }
        if (typeof window.process === 'undefined') {
          window.process = { env: { NODE_ENV: 'development' } };
        }
      })();
    </script>
</head>
<body>
    <div id="root"></div>
    <script type="module" src="./index.tsx"></script>
</body>
</html>
