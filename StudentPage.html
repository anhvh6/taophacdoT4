<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="utf-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
    <title>Phác đồ <?= customer.name ?></title>
    <meta property="og:title" content="Phác đồ <?= customer.name ?>" />
    <meta property="og:description" content="Hành trình đánh thức vẻ đẹp tự nhiên, gìn giữ thanh xuân." />
    <meta property="og:type" content="website" />
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800;900&display=swap" rel="stylesheet"/>
    <style>
      :root {
        --brand-main: #2563EB;
        --brand-deep: #1E3A8A;
        --brand-soft: #F8FBFF;
        --brand-text: #1E3A8A;
        --brand-light-blue: #3B82F6;
        --brand-green: #10B981;
        --radius-m: 22px;
        --radius-l: 32px;
        --shadow-mini: 0 6px 18px rgba(30,58,138,.05);
        --border-soft: 1px solid rgba(147,197,253,.45);
        --grad-blue: linear-gradient(135deg, #3B82F6 0%, #2563EB 100%);
      }
      * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; outline: none; }
      html, body { height: 100%; margin: 0; padding: 0; }
      body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: var(--brand-soft); color: var(--brand-text); line-height: 1.6; -webkit-font-smoothing: antialiased; }
      
      .container { max-width: 1200px; margin: 0 auto; padding: 40px 16px 120px; }
      
      /* CHAT OVERLAY - SỬA LỖI CĂN GIỮA & FULL HEIGHT */
      .chat-overlay { 
        position: fixed; 
        top: 0; left: 0; right: 0; bottom: 0;
        width: 100% !important;
        height: 100% !important;
        background: #000000 !important; 
        z-index: 99999; 
        display: none; 
        flex-direction: column; 
        align-items: center; 
        justify-content: center; 
        overflow: hidden;
      }
      .chat-overlay.show { display: flex; }
      
      .chat-header { 
        position: absolute; 
        top: 0; left: 0; right: 0; 
        display: flex; 
        justify-content: space-between; 
        align-items: center; 
        z-index: 100001; 
        padding: 10px 20px;
        background: transparent;
      }
      
      .chat-status-pill { 
        display: flex; 
        align-items: center; 
        gap: 8px; 
        background: transparent; 
        backdrop-filter: none; 
        padding: 0; 
        border-radius: 0; 
        color: white; 
        font-size: clamp(8px, 2.5vw, 11px); 
        font-weight: 700; 
        text-transform: uppercase; 
        letter-spacing: 0.1em; 
        border: none; 
        box-shadow: none; 
        animation: none;
        max-width: 90%;
        text-align: center;
        line-height: 1.2;
        text-shadow: 0 2px 4px rgba(0,0,0,0.5);
      }
      
      @keyframes neonPulse {
        0%, 100% { transform: scale(1); box-shadow: 0 0 10px rgba(59, 130, 246, 0.3); border-color: rgba(59, 130, 246, 0.4); }
        50% { transform: scale(1.03); box-shadow: 0 0 30px rgba(59, 130, 246, 0.7); border-color: rgba(59, 130, 246, 1); }
      }
      
      .chat-close { 
        width: 50px; height: 50px; 
        border-radius: 50%; 
        background: rgba(255,255,255,0.15); 
        border: 1px solid rgba(255,255,255,0.2); 
        color: white; 
        display: flex; 
        align-items: center; 
        justify-content: center; 
        cursor: pointer; 
        backdrop-filter: blur(10px);
        font-size: 22px;
        transition: all 0.3s;
      }
      .chat-close:hover { background: rgba(255,0,0,0.5); transform: rotate(90deg); }
      
      /* FORCE CENTER THE EXPERT FRAME */
      .chat-iframe-container { 
        position: absolute;
        inset: 0;
        display: flex !important; 
        align-items: center !important; 
        justify-content: center !important; 
        background: #000 !important;
        overflow: hidden !important;
      }
      .chat-iframe { 
        height: 100dvh !important; 
        width: 177.78dvh !important; /* 16:9 ratio based on height */
        min-width: 177.78dvh !important;
        max-width: none !important;
        border: none !important;
        display: block !important;
        flex-shrink: 0 !important;
        box-shadow: 0 0 100px rgba(0,0,0,0.5);
      }

      /* Các style khác giữ nguyên */
      header { text-align: center; margin-bottom: 50px; }
      header h1 { font-size: 30px; font-weight: 900; color: var(--brand-deep); margin: 0 0 12px; text-transform: uppercase; letter-spacing: -0.02em; line-height: 1.2; }
      header p { color: var(--brand-light-blue); font-style: italic; font-size: 15px; margin: 0 0 28px; opacity: 0.8; max-width: 600px; margin-left: auto; margin-right: auto; }
      .date-pill { display: inline-flex; align-items: center; gap: 8px; background: white; padding: 10px 24px; border-radius: 999px; border: var(--border-soft); color: var(--brand-main); font-weight: 800; font-size: 12px; text-transform: uppercase; letter-spacing: 0.05em; box-shadow: var(--shadow-mini); }
      .card { background: white; border-radius: var(--radius-m); padding: 32px; box-shadow: var(--shadow-mini); border: var(--border-soft); margin-bottom: 32px; }
      .customer-info { display: flex; flex-direction: column; gap: 4px; margin-bottom: 20px; border-bottom: 1px solid #f0f4f8; padding-bottom: 20px; }
      .customer-name { font-size: 22px; font-weight: 900; color: var(--brand-deep); text-transform: uppercase; }
      .label-small { font-size: 11px; font-weight: 900; color: var(--brand-green); text-transform: uppercase; letter-spacing: 0.1em; display: block; margin-bottom: 8px; }
      .analysis-box { font-size: 16px; font-weight: 500; text-align: justify; white-space: pre-line; color: var(--brand-deep); line-height: 1.75; }
      .layout-grid { display: grid; grid-template-columns: 1fr; gap: 32px; }
      @media (min-width: 1024px) { .layout-grid { grid-template-columns: 340px 1fr; } }
      .sidebar { display: flex; flex-direction: column; gap: 20px; }
      .sidebar-item { border-radius: var(--radius-m); padding: 28px; border: var(--border-soft); transition: all 0.3s; position: relative; overflow: hidden; }
      .sidebar-item.dark { background: var(--brand-deep); color: white; border: none; box-shadow: 0 15px 35px rgba(30,58,138,0.15); }
      .sidebar-title { font-size: 17px; font-weight: 900; margin-bottom: 14px; text-transform: uppercase; border-bottom: 1px solid rgba(255,255,255,0.1); padding-bottom: 10px; letter-spacing: 0.02em; }
      .sidebar-item:not(.dark) .sidebar-title { border-bottom-color: #f1f5f9; color: var(--brand-deep); }
      .sidebar-content { font-size: 14px; font-weight: 500; text-align: justify; white-space: pre-line; opacity: 0.9; }
      .main-content { background: white; border-radius: var(--radius-l); padding: 40px; box-shadow: var(--shadow-mini); border: var(--border-soft); }
      .main-title { font-size: 22px; font-weight: 900; text-align: center; margin-bottom: 32px; text-transform: uppercase; color: var(--brand-deep); }
      .legend { display: flex; flex-wrap: wrap; justify-content: center; gap: 20px; margin-bottom: 32px; }
      .legend-item { display: flex; align-items: center; gap: 8px; font-size: 10px; font-weight: 900; text-transform: uppercase; letter-spacing: 0.05em; color: #64748b; }
      .dot { width: 10px; height: 10px; border-radius: 50%; }
      .days-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); gap: 16px; }
      .day-card { background: white; border: var(--border-soft); border-radius: 24px; padding: 20px; cursor: pointer; transition: all 0.3s; position: relative; }
      .day-card.active { border: 2.5px solid var(--brand-main); box-shadow: 0 12px 30px rgba(37,99,235,0.15); transform: scale(1.02); }
      .day-card.active::before { content: 'HÔM NAY'; position: absolute; top: -12px; left: 50%; transform: translateX(-50%); background: var(--brand-main); color: white; padding: 4px 14px; border-radius: 99px; font-size: 9px; font-weight: 900; letter-spacing: 0.1em; }
      .day-card.locked { opacity: 0.45; filter: grayscale(1); cursor: not-allowed; }
      .day-header { text-align: center; font-weight: 900; color: #94a3b8; font-size: 13px; margin-bottom: 12px; text-transform: uppercase; border-bottom: 1px solid #f8fafc; padding-bottom: 10px; transition: color 0.3s; }
      .day-card.unlocked .day-header { color: var(--brand-main); }
      .task-item { margin-bottom: 6px; }
      .task-trigger { width: 100%; font-size: 14px; padding: 10px; display: block; font-weight: 700; text-align: center; border-radius: 12px; border: none; background: transparent; transition: all 0.2s; cursor: pointer; }
      .task-trigger:hover { background: #f8fbff; }
      .btn-primary { background: var(--brand-main); color: white; border: none; padding: 18px; width: 100%; font-weight: 900; cursor: pointer; text-transform: uppercase; border-radius: 18px; font-size: 12px; display: flex; align-items: center; justify-content: center; gap: 10px; box-shadow: 0 10px 20px rgba(37,99,235,0.2); transition: all 0.3s; }
      .btn-primary:active { transform: scale(0.97); }
      .btn-chat { background: #F97316; box-shadow: 0 10px 20px rgba(249,115,22,0.2); } 
      .modal { position: fixed; inset: 0; background: rgba(15, 23, 42, 0.7); z-index: 10000; display: none; align-items: center; justify-content: center; padding: 20px; backdrop-filter: blur(10px); }
      .modal.show { display: flex; }
      .modal-inner { background: white; width: 100%; max-width: 500px; border-radius: var(--radius-l); overflow: hidden; animation: slideUp 0.4s cubic-bezier(0.16, 1, 0.3, 1); box-shadow: 0 30px 60px rgba(0,0,0,0.25); }
      .modal-header { padding: 28px 32px; border-bottom: 1px solid #f1f5f9; background: #f8fbff; }
      .modal-body { padding: 32px; font-size: 16px; line-height: 1.8; white-space: pre-line; text-align: justify; max-height: 55vh; overflow-y: auto; color: #334155; font-weight: 500; }
      .modal-footer { padding: 28px 32px; }
      .zalo-float { position: fixed; bottom: 30px; right: 30px; width: 64px; height: 64px; background: #0068ff; border-radius: 50%; display: flex; align-items: center; justify-content: center; box-shadow: 0 15px 35px rgba(0,104,255,0.4); z-index: 5000; border: 4px solid white; transition: transform 0.3s; }
      .refresh-toast { position: fixed; top: 20px; left: 50%; transform: translateX(-50%); background: var(--brand-deep); color: white; padding: 10px 24px; border-radius: 50px; font-size: 11px; font-weight: 800; box-shadow: 0 10px 30px rgba(0,0,0,0.2); display: none; z-index: 20000; text-transform: uppercase; letter-spacing: 0.05em; }
      @keyframes slideUp { from { opacity: 0; transform: translateY(30px); } to { opacity: 1; transform: translateY(0); } }
      .blocked-screen { position: fixed; inset: 0; background: #f8fbff; z-index: 30000; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 40px; text-align: center; }
      .hidden-on-collapse { display: none; }
      body.expanded .hidden-on-collapse { display: block; }
    </style>
</head>

    <script>
      var DATA = <?!= JSON.stringify(customer) ?>;
      var PARAMS = <?!= JSON.stringify(params) ?>;
      var isExpanded = false;
      var refreshInFlight = false;

      function renderHeader() {
        const header = document.getElementById('app-header');
        if (!header) return;
        header.querySelector('h1').innerText = DATA.app_title || "PHÁC ĐỒ 30 NGÀY THAY ĐỔI KHUÔN MẶT";
        header.querySelector('p').innerText = DATA.app_slogan ? `"${DATA.app_slogan}"` : "";
        const datePill = header.querySelector('.date-pill');
        if (datePill && DATA.start) {
          datePill.innerText = "Ngày bắt đầu: " + DATA.start.split('-').reverse().join('/');
        }
        const noteBox = document.getElementById('customer-note');
        if (noteBox) {
          noteBox.innerText = DATA.note || "Nội dung đang được cập nhật...";
        }
      }

      function renderGrid() {
        const grid = document.getElementById('days-grid');
        let html = '';
        for(let i=1; i<=30; i++) {
          const tasks = DATA.tasks.filter(t => t.day == i);
          // Sắp xếp bài tập: Bắt buộc lên đầu
          tasks.sort((a, b) => {
            const aM = String(a.type || "").toLowerCase().includes('bắt buộc') || String(a.type || "").toLowerCase().includes('bat buoc');
            const bM = String(b.type || "").toLowerCase().includes('bắt buộc') || String(b.type || "").toLowerCase().includes('bat buoc');
            if (aM && !bM) return -1;
            if (!aM && bM) return 1;
            return 0;
          });
          
          const isLocked = i > DATA.allowed_day;
          const isActive = i === DATA.allowed_day;
          const isUnlocked = i <= DATA.allowed_day;
          
          html += `
            <div class="day-card ${isActive ? 'active' : ''} ${isUnlocked ? 'unlocked' : ''} ${isLocked ? 'locked' : ''} ${i > 10 ? 'hidden-on-collapse' : ''}" onclick="handleDayClick(${i})">
              <div class="day-header" style="color:${isUnlocked ? 'var(--brand-deep)' : '#94a3b8'}">Ngày ${i}</div>
              ${tasks.length ? tasks.map((t, idx) => `
                <div class="task-item">
                  <button class="task-trigger" style="color: ${String(t.type).toLowerCase().includes('bắt buộc') ? 'var(--brand-main)' : 'var(--brand-green)'}" onclick="event.stopPropagation(); showTask(${i}, ${idx})">
                    ${t.title}
                  </button>
                </div>
              `).join('') : '<div style="text-align:center; font-size:10px; color:#cbd5e1; font-style:italic; padding:10px 0;">NGHỈ NGƠI</div>'}
            </div>
          `;
        }
        grid.innerHTML = html;
      }

      function handleDayClick(day) {
        if (day > DATA.allowed_day) {
          const start = new Date(DATA.start);
          start.setDate(start.getDate() + (day - 1));
          const dateStr = start.getDate().toString().padStart(2,'0') + '/' + (start.getMonth()+1).toString().padStart(2,'0') + '/' + start.getFullYear();
          showAlert("Bài này chưa mở đâu", `Lộ trình của bạn được thiết kế theo từng ngày để đảm bảo hiệu quả cao nhất. Hãy quay lại vào ngày <b>${dateStr}</b> để tiếp tục nhé!`);
        }
      }

      function showTask(day, idx) {
        if (day <= DATA.allowed_day && day % 3 === 0) {
          runSilentRefresh();
        }

        if (day > DATA.allowed_day) {
          handleDayClick(day);
          return;
        }

        const dayTasks = DATA.tasks.filter(t => t.day == day);
        // Sắp xếp bài tập: Bắt buộc lên đầu (phải khớp với renderGrid)
        dayTasks.sort((a, b) => {
          const aM = String(a.type || "").toLowerCase().includes('bắt buộc') || String(a.type || "").toLowerCase().includes('bat buoc');
          const bM = String(b.type || "").toLowerCase().includes('bắt buộc') || String(b.type || "").toLowerCase().includes('bat buoc');
          if (aM && !bM) return -1;
          if (!aM && bM) return 1;
          return 0;
        });
        const task = dayTasks[idx];

        const displayTaskDetail = () => {
          document.getElementById('modal-label').innerText = "Ngày " + day + " • " + (task.type || "Bài tập");
          document.getElementById('modal-title').innerText = task.title;
          document.getElementById('modal-body').innerText = task.detail || "Nội dung bài tập đang được cập nhật...";
          
          const footer = document.getElementById('modal-footer');
          if (task.link) {
            footer.innerHTML = `<button class="btn-primary" onclick="window.open('${task.link}','_blank')">▶ XEM HƯỚNG DẪN BÀI TẬP</button>`;
          } else {
            footer.innerHTML = `<button class="btn-primary" onclick="closeModal()">ĐÓNG</button>`;
          }
          
          document.getElementById('app-modal').classList.add('show');
        };

        if (DATA.expire_warning) {
          showAlert("Nhắc nhở gia hạn", 
            `Phác đồ cá nhân của bạn sắp kết thúc thời hạn vào ngày <b>${DATA.end.split('-').reverse().join('/')}</b>. Hãy liên hệ với MeGa Phương để gia hạn và tiếp tục hành trình nhé!`, 
            displayTaskDetail
          );
        } else {
          displayTaskDetail();
        }
      }

      function openChat() {
         document.getElementById('chat-frame').src = "https://embed.liveavatar.com/v1/6efaef91-58e5-4569-83fc-47eacbf44063?language=vi-VN";
         document.getElementById('chat-overlay').classList.add('show');
         document.body.style.overflow = 'hidden';
      }

      function closeChat() {
         document.getElementById('chat-overlay').classList.remove('show');
         document.getElementById('chat-frame').src = "";
         document.body.style.overflow = 'auto';
      }

      function showAlert(title, message, onConfirm) {
        document.getElementById('modal-label').innerText = "THÔNG BÁO";
        document.getElementById('modal-title').innerText = title;
        document.getElementById('modal-body').innerHTML = message;
        document.getElementById('modal-footer').innerHTML = `<button class="btn-primary" id="alert-confirm">ĐÃ HIỂU</button>`;
        document.getElementById('alert-confirm').onclick = function() {
          if (onConfirm) {
            onConfirm();
          } else {
            closeModal();
          }
        };
        document.getElementById('app-modal').classList.add('show');
      }

      function toggleExpand() {
        isExpanded = !isExpanded;
        document.body.classList.toggle('expanded', isExpanded);
        document.getElementById('toggle-btn').innerText = isExpanded ? "Thu gọn phác đồ" : "Xem tất cả 30 ngày";
      }

      function runSilentRefresh(onComplete) {
        if (refreshInFlight) return;
        refreshInFlight = true;
        document.getElementById('silent-refresh-toast').style.display = 'block';
        google.script.run.withSuccessHandler(function(res) {
          refreshInFlight = false;
          document.getElementById('silent-refresh-toast').style.display = 'none';
          if (res && res.ok) {
            DATA.tasks = res.tasks;
            DATA.allowed_day = res.allowed_day;
            DATA.expire_warning = res.expire_warning;
            DATA.access_state = res.state;
            DATA.start = res.start_date;
            DATA.end = res.end_date;
            DATA.app_title = res.app_title;
            DATA.app_slogan = res.app_slogan;
            DATA.note = res.note;
            DATA.chewing = res.chewing;
            DATA.blocks = res.sidebar_blocks;
            
            const blockedScreen = document.getElementById('blocked-screen');
            if (blockedScreen) {
              if (res.state === 'ACTIVE' || res.state === 'NOT_STARTED') {
                blockedScreen.style.display = 'none';
              } else {
                blockedScreen.style.display = 'flex';
                const title = document.getElementById('blocked-title');
                const msg = document.getElementById('blocked-message');
                const icon = document.getElementById('blocked-icon');
                if (title) title.innerText = res.state === "DELETED" ? 'Phác đồ đã khóa' : 'Phác đồ hết hạn';
                if (icon) icon.innerText = res.state === "DELETED" ? '🔒' : '⌛';
                if (msg) {
                  msg.innerText = res.state === "DELETED" 
                    ? 'Tài khoản hiện đang tạm khóa, vui lòng liên hệ với MeGa Phương để được hỗ trợ nhé!' 
                    : 'Phác đồ cá nhân của bạn đã hết thời hạn sử dụng. Hãy liên hệ với MeGa Phương để gia hạn nhé! (Ngày hết hạn: ' + res.end_date.split('-').reverse().join('/') + ')';
                }
              }
            }
            
            renderHeader();
            renderGrid();
            
            // Nếu modal đang mở, cập nhật nội dung modal
            const modal = document.getElementById('app-modal');
            if (modal && modal.classList.contains('show')) {
              const modalLabel = document.getElementById('modal-label').innerText;
              if (modalLabel.includes('Ngày')) {
                const dayMatch = modalLabel.match(/Ngày (\d+)/);
                if (dayMatch) {
                  const day = parseInt(dayMatch[1]);
                  const modalTitle = document.getElementById('modal-title').innerText;
                  const updatedTask = DATA.tasks.find(t => t.day == day && t.title === modalTitle);
                  if (updatedTask) {
                    document.getElementById('modal-body').innerText = updatedTask.detail || "Nội dung bài tập đang được cập nhật...";
                    const footer = document.getElementById('modal-footer');
                    if (updatedTask.link) {
                      footer.innerHTML = `<button class="btn-primary" onclick="window.open('${updatedTask.link}','_blank')">▶ XEM HƯỚNG DẪN BÀI TẬP</button>`;
                    }
                  }
                }
              }
            }
            
            if (onComplete) onComplete();
          }
        }).getServerData(PARAMS.u, PARAMS.t, true);
      }

      function scrollToActive() {
        setTimeout(function() {
          const activeCard = document.querySelector('.day-card.active');
          if (activeCard) {
            activeCard.scrollIntoView({ behavior: 'smooth', block: 'center' });
          }
        }, 300);
      }

      function closeModal() { document.getElementById('app-modal').classList.remove('show'); }
      
      window.onload = function() {
        renderHeader();
        renderGrid();
        runSilentRefresh(function() {
          if (DATA.allowed_day > 10) {
            toggleExpand();
          }
          scrollToActive();
        });
      };
    </script>
</body>
</html>
